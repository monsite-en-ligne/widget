<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Contact</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; color: #37352f; overflow: hidden; }
  html { overflow: hidden; }
  .w { padding: 16px 20px; }
  .form-group { margin-bottom: 14px; position: relative; }
  .form-label { font-size: 12px; font-weight: 500; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 11px 14px; border: 1.5px solid #e0dfd8; border-radius: 10px; font-size: 14px; color: #37352f; font-family: inherit; background: #fafaf8; outline: none; transition: all 0.25s; }
  .form-input:focus { border-color: #6c5ce7; background: white; box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1); }
  .form-input::placeholder { color: #c0bfb8; }
  .form-textarea { width: 100%; min-height: 100px; padding: 12px 14px; border: 1.5px solid #e0dfd8; border-radius: 10px; font-size: 14px; color: #37352f; font-family: inherit; resize: none; background: #fafaf8; outline: none; transition: all 0.25s; }
  .form-textarea:focus { border-color: #6c5ce7; background: white; box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1); }
  .form-textarea::placeholder { color: #c0bfb8; }
  .form-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
  .form-btn { background: linear-gradient(135deg, #6c5ce7, #a855f7); color: white; font-size: 14px; font-weight: 600; padding: 11px 28px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; transition: all 0.25s; display: flex; align-items: center; gap: 6px; }
  .form-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3); }
  .form-btn:active { transform: translateY(0); }
  .form-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .form-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .form-status { font-size: 13px; color: #6b6b6b; transition: all 0.3s; }
  .form-status.success { color: #2b7a2b; font-weight: 500; }
  .form-status.error { color: #c0392b; }
  .secure-badge { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #b0b0a8; margin-top: 12px; }
  .secure-badge svg { width: 12px; height: 12px; fill: none; stroke: #b0b0a8; stroke-width: 2; }
  @media (max-width: 480px) {
    .w { padding: 12px 14px; }
    .form-input, .form-textarea { font-size: 13px; padding: 10px 12px; }
    .form-textarea { min-height: 80px; }
    .form-btn { padding: 10px 20px; font-size: 13px; }
    .form-footer { flex-direction: column-reverse; gap: 8px; align-items: stretch; }
    .form-btn { justify-content: center; }
  }
</style>
</head>
<body>
<div class="w">
  <div class="form-group">
    <label class="form-label">Objet</label>
    <input type="text" class="form-input" id="subject" placeholder="Ex : Retour sur mon site, question sur un service...">
  </div>

  <div class="form-group">
    <label class="form-label">Votre message</label>
    <textarea class="form-textarea" id="message" placeholder="Décrivez votre demande ici..."></textarea>
  </div>

  <div class="form-footer">
    <span class="form-status" id="status"></span>
    <button class="form-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Envoyer
    </button>
  </div>

  <div class="secure-badge">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    Message sécurisé — envoyé directement à votre gestionnaire
  </div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var email = params.get("email") || "contact@monsite-en-ligne.com";
var clientName = params.get("client") || "Client";
var webhookUrl = params.get("webhook") || "";

function sendMessage() {
  var subject = document.getElementById("subject").value.trim();
  var message = document.getElementById("message").value.trim();
  var status = document.getElementById("status");
  var sendBtn = document.getElementById("sendBtn");

  if (!message) {
    status.textContent = "Veuillez écrire un message.";
    status.className = "form-status error";
    return;
  }

  if (!subject) {
    subject = "Message depuis l'espace projet";
  }

  sendBtn.disabled = true;
  status.textContent = "Envoi en cours...";
  status.className = "form-status";

  if (webhookUrl) {
    fetch(webhookUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        to: email,
        from_client: clientName,
        subject: subject,
        message: message
      })
    })
    .then(function(r) {
      if (r.ok) {
        status.textContent = "✓ Message envoyé avec succès !";
        status.className = "form-status success";
        document.getElementById("message").value = "";
        document.getElementById("subject").value = "";
      } else {
        throw new Error("Erreur serveur");
      }
    })
    .catch(function() {
      status.textContent = "Erreur d'envoi. Réessayez ou écrivez à " + email;
      status.className = "form-status error";
    })
    .finally(function() {
      sendBtn.disabled = false;
    });
  } else {
    window.open("mailto:" + email + "?subject=" + encodeURIComponent(subject + " — " + clientName) + "&body=" + encodeURIComponent(message));
    status.textContent = "✓ Votre messagerie va s'ouvrir...";
    status.className = "form-status success";
    sendBtn.disabled = false;
  }
}
</script>
</body>
</html>
