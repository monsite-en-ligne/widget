<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: none; color: #2d2d2d; }
  .w { padding: 16px 20px; }
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 11px; font-weight: 600; color: #8a8a8a; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; display: block; }

  .input-wrap { position: relative; border-radius: 14px; padding: 2px; background: #e8e8e6; }
  .input-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 14px;
    padding: 2px;
    background: conic-gradient(from var(--angle, 0deg), transparent 30%, rgba(108,92,231,0.08) 40%, rgba(108,92,231,0.3) 50%, rgba(168,85,247,0.35) 55%, rgba(108,92,231,0.3) 60%, rgba(108,92,231,0.08) 70%, transparent 80%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: rotateBorder 6s linear infinite;
    transition: all 0.4s ease;
  }
  .input-wrap:hover::before,
  .input-wrap:focus-within::before,
  .input-wrap.has-text::before {
    animation-play-state: paused;
    background: conic-gradient(from var(--angle, 0deg), rgba(108,92,231,0.25) 0%, rgba(168,85,247,0.3) 25%, rgba(108,92,231,0.25) 50%, rgba(168,85,247,0.3) 75%, rgba(108,92,231,0.25) 100%);
  }
  .input-wrap:focus-within {
    box-shadow: 0 4px 20px rgba(108,92,231,0.06);
  }

  @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
  @keyframes rotateBorder { to { --angle: 360deg; } }

  .form-input { width: 100%; padding: 13px 16px; border: none; border-radius: 12px; font-size: 14px; color: #2d2d2d; font-family: inherit; background: #f8f8f6; outline: none; transition: all 0.3s ease; }
  .form-input:focus { background: #fff; }
  .form-input::placeholder { color: #bbb; }
  .form-textarea { width: 100%; min-height: 110px; padding: 13px 16px; border: none; border-radius: 12px; font-size: 14px; color: #2d2d2d; font-family: inherit; resize: none; background: #f8f8f6; outline: none; transition: all 0.3s ease; }
  .form-textarea:focus { background: #fff; }
  .form-textarea::placeholder { color: #bbb; }
  .form-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; }
  .form-btn { background: linear-gradient(180deg, #3a3a3a, #2d2d2d); color: white; font-size: 14px; font-weight: 500; padding: 12px 28px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); position: relative; }
  .form-btn::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px; background: linear-gradient(90deg, transparent, #6c5ce7, transparent); border-radius: 2px; opacity: 0.6; transition: all 0.3s ease; }
  .form-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.16); }
  .form-btn:hover:not(:disabled)::after { opacity: 1; left: 10%; right: 10%; }
  .form-btn:active:not(:disabled) { transform: translateY(0); }
  .form-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .form-btn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.8; }
  .form-status { font-size: 13px; color: #999; }
  .form-status.success { color: #2d2d2d; font-weight: 500; }
  .form-status.error { color: #c0392b; }
  .secure-badge { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #aaa; margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; }
  .secure-badge svg { width: 13px; height: 13px; fill: none; stroke: #aaa; stroke-width: 1.5; flex-shrink: 0; }
  .online-dot { width: 6px; height: 6px; border-radius: 50%; background: #2ecc71; box-shadow: 0 0 6px rgba(46,204,113,0.4); animation: dotGlow 2.5s ease-in-out infinite; flex-shrink: 0; }
  @keyframes dotGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>

<div class="w">
  <div class="form-group">
    <label class="form-label">Objet</label>
    <div class="input-wrap" id="subjectWrap">
      <input type="text" class="form-input" id="subject" placeholder="Ex : Retour sur mon site, question sur un service..." oninput="checkFields()">
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Votre message</label>
    <div class="input-wrap" id="messageWrap">
      <textarea class="form-textarea" id="message" placeholder="Décrivez votre demande ici..." oninput="checkFields()"></textarea>
    </div>
  </div>

  <div class="form-footer">
    <span class="form-status" id="status"></span>
    <button class="form-btn" id="sendBtn" disabled onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Envoyer
    </button>
  </div>

  <div class="secure-badge">
    <span class="online-dot"></span>
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    Message sécurisé · envoyé directement à votre gestionnaire
  </div>
</div>

<script>
function checkFields() {
  var subject = document.getElementById("subject").value.trim();
  var message = document.getElementById("message").value.trim();
  var subjectWrap = document.getElementById("subjectWrap");
  var messageWrap = document.getElementById("messageWrap");
  var sendBtn = document.getElementById("sendBtn");

  if (subject.length > 0) {
    subjectWrap.classList.add("has-text");
  } else {
    subjectWrap.classList.remove("has-text");
  }

  if (message.length > 0) {
    messageWrap.classList.add("has-text");
  } else {
    messageWrap.classList.remove("has-text");
  }

  sendBtn.disabled = !(subject.length > 0 && message.length > 0);
}

function sendMessage() {
  var subject = document.getElementById("subject").value.trim();
  var message = document.getElementById("message").value.trim();
  var status = document.getElementById("status");
  var sendBtn = document.getElementById("sendBtn");

  if (!subject || !message) {
    status.textContent = "Veuillez remplir l'objet et le message.";
    status.className = "form-status error";
    return;
  }

  sendBtn.disabled = true;
  status.textContent = "Envoi en cours...";
  status.className = "form-status";

  var params = new URLSearchParams(window.location.search);
  var email = params.get("email") || "contact@monsite-en-ligne.com";
  var clientName = params.get("client") || "Client";
  var webhookUrl = params.get("webhook") || "";

  if (webhookUrl) {
    fetch(webhookUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ to: email, from_client: clientName, subject: subject, message: message })
    })
    .then(function(r) {
      if (r.ok) {
        status.textContent = "✓ Message envoyé avec succès";
        status.className = "form-status success";
        document.getElementById("message").value = "";
        document.getElementById("subject").value = "";
        checkFields();
      } else { throw new Error("Erreur"); }
    })
    .catch(function() {
      status.textContent = "Erreur d'envoi. Réessayez ou écrivez à " + email;
      status.className = "form-status error";
      sendBtn.disabled = false;
    });
  } else {
    window.open("mailto:" + email + "?subject=" + encodeURIComponent(subject + " — " + clientName) + "&body=" + encodeURIComponent(message));
    status.textContent = "✓ Votre messagerie va s'ouvrir...";
    status.className = "form-status success";
    sendBtn.disabled = false;
  }
}
</script>
