<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Contact</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; color: #37352f; overflow: hidden; }
  html { overflow: hidden; }
  .w { padding: 20px 24px; }
  .form-group { margin-bottom: 16px; position: relative; }
  .form-label { font-size: 11px; font-weight: 600; color: #6c5ce7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .form-label svg { width: 14px; height: 14px; stroke: #6c5ce7; fill: none; stroke-width: 2; }
  .form-input { width: 100%; padding: 13px 16px; border: 2px solid #d8d4f7; border-radius: 12px; font-size: 14px; color: #37352f; font-family: inherit; background: #faf9ff; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .form-input:hover { border-color: #b8b0f0; background: #f5f3ff; }
  .form-input:focus { border-color: #6c5ce7; background: white; box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.12), 0 4px 12px rgba(108, 92, 231, 0.08); transform: translateY(-1px); }
  .form-input::placeholder { color: #b8b0f0; }
  .form-textarea { width: 100%; min-height: 110px; padding: 13px 16px; border: 2px solid #d8d4f7; border-radius: 12px; font-size: 14px; color: #37352f; font-family: inherit; resize: none; background: #faf9ff; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .form-textarea:hover { border-color: #b8b0f0; background: #f5f3ff; }
  .form-textarea:focus { border-color: #6c5ce7; background: white; box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.12), 0 4px 12px rgba(108, 92, 231, 0.08); transform: translateY(-1px); }
  .form-textarea::placeholder { color: #b8b0f0; }
  .form-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
  .form-btn { background: linear-gradient(135deg, #6c5ce7, #a855f7); color: white; font-size: 14px; font-weight: 600; padding: 12px 28px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; position: relative; overflow: hidden; }
  .form-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transition: left 0.5s; }
  .form-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.35); }
  .form-btn:hover::before { left: 100%; }
  .form-btn:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(108, 92, 231, 0.3); }
  .form-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .form-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .form-status { font-size: 13px; color: #6b6b6b; transition: all 0.3s; }
  .form-status.success { color: #2b7a2b; font-weight: 500; }
  .form-status.error { color: #c0392b; }
  .secure-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #9b97b8; margin-top: 14px; padding-top: 14px; border-top: 1px solid #ede9fe; }
  .secure-badge svg { width: 14px; height: 14px; fill: none; stroke: #9b97b8; stroke-width: 2; }
  .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: #6c5ce7; animation: dotPulse 2s ease-in-out infinite; display: inline-block; margin-left: 4px; }
  @keyframes dotPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
  @media (max-width: 480px) {
    .w { padding: 14px 16px; }
    .form-input, .form-textarea { font-size: 13px; padding: 11px 14px; }
    .form-textarea { min-height: 90px; }
    .form-btn { padding: 11px 22px; font-size: 13px; }
    .form-footer { flex-direction: column-reverse; gap: 10px; align-items: stretch; }
    .form-btn { justify-content: center; }
  }
</style>
</head>
<body>
<div class="w">
  <div class="form-group">
    <label class="form-label">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Objet
    </label>
    <input type="text" class="form-input" id="subject" placeholder="Ex : Retour sur mon site, question sur un service...">
  </div>

  <div class="form-group">
    <label class="form-label">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Votre message
    </label>
    <textarea class="form-textarea" id="message" placeholder="Décrivez votre demande ici..."></textarea>
  </div>

  <div class="form-footer">
    <span class="form-status" id="status"></span>
    <button class="form-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Envoyer
    </button>
  </div>

  <div class="secure-badge">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    Message sécurisé — envoyé directement à votre gestionnaire
    <span class="pulse-dot"></span>
  </div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var email = params.get("email") || "contact@monsite-en-ligne.com";
var clientName = params.get("client") || "Client";
var webhookUrl = params.get("webhook") || "";

function sendMessage() {
  var subject = document.getElementById("subject").value.trim();
  var message = document.getElementById("message").value.trim();
  var status = document.getElementById("status");
  var sendBtn = document.getElementById("sendBtn");

  if (!message) {
    status.textContent = "Veuillez écrire un message.";
    status.className = "form-status error";
    return;
  }

  if (!subject) {
    subject = "Message depuis l'espace projet";
  }

  sendBtn.disabled = true;
  status.textContent = "Envoi en cours...";
  status.className = "form-status";

  if (webhookUrl) {
    fetch(webhookUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        to: email,
        from_client: clientName,
        subject: subject,
        message: message
      })
    })
    .then(function(r) {
      if (r.ok) {
        status.textContent = "✓ Message envoyé avec succès !";
        status.className = "form-status success";
        document.getElementById("message").value = "";
        document.getElementById("subject").value = "";
      } else {
        throw new Error("Erreur serveur");
      }
    })
    .catch(function() {
      status.textContent = "Erreur d'envoi. Réessayez ou écrivez à " + email;
      status.className = "form-status error";
    })
    .finally(function() {
      sendBtn.disabled = false;
    });
  } else {
    window.open("mailto:" + email + "?subject=" + encodeURIComponent(subject + " — " + clientName) + "&body=" + encodeURIComponent(message));
    status.textContent = "✓ Votre messagerie va s'ouvrir...";
    status.className = "form-status success";
    sendBtn.disabled = false;
  }
}
</script>
</body>
</html>
